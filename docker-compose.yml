services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: bugbountyplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "postgres_dev_password"
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bugbountyplatform"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./backend
      dockerfile: Bug-Bounty-Platform.Api/Dockerfile
    container_name: postgres-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=bugbountyplatform;Username=postgres;Password=postgres_dev_password"
    ports:
      - "5094:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
