services:
  db:
    image: postgres:16-alpine
    container_name: bbp-db
    environment:
      POSTGRES_DB: bugbountyplatform
      POSTGRES_USER: bbp
      POSTGRES_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbp -d bugbountyplatform"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./backend
      dockerfile: Bug-Bounty-Platform.Api/Dockerfile
    container_name: bbp-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=bugbountyplatform;Username=bbp;Password=YourStrong!Passw0rd"
    ports:
      - "5094:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
